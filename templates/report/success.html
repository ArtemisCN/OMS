{% extends "base.html" %}
{% block title %}提交成功{% endblock %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="mb-4">
            <i class="fas fa-check-circle" style="font-size:80px;color:#22c55e;"></i>
        </div>
        <h4>报修提交成功！</h4>
        <p class="text-muted">工单 #{{ order.id }} 已创建，工程师将尽快处理</p>
        <div class="card bg-light mt-4 text-start">
            <div class="card-body">
                <h6>工单信息</h6>
                <table class="table table-sm mb-0">
                    <tr><td class="text-muted" style="width:80px;">编号</td><td>#{{ order.id }}</td></tr>
                    <tr><td class="text-muted">标题</td><td>{{ order.title }}</td></tr>
                    <tr><td class="text-muted">时间</td><td>{{ order.created_at.strftime('%Y/%m/%d %H:%M') }}</td></tr>
                </table>
            </div>
        </div>
        <div class="mt-4">
            <a href="{{ url_for('report_qr.report_submit', hospital_id=hospital.id) }}" class="btn btn-primary">
                <i class="fas fa-plus"></i> 继续报修
            </a>
        </div>
    </div>
</div>
{% endblock %}
