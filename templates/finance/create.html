{% extends "base.html" %}
{% block content %}
<style>
.invoice-row { background: #f9fafb; border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid #e5e7eb; }
</style>

<div class="mb-3">
    <a href="{{ url_for('finance.index') }}" class="text-muted" style="font-size:13px;"><i class="fas fa-arrow-left"></i> 返回列表</a>
</div>
<h5 class="fw-bold mb-3" style="font-size:15px;"><i class="fas fa-plus-circle" style="color:#f59e0b;"></i> 新建做账批次</h5>

<form method="POST" id="batchForm">
    <!-- 收款方信息 -->
    <div class="card mb-3" style="border:1px solid #e5e7eb;border-radius:10px;">
        <div class="card-body">
            <h6 class="fw-bold mb-3" style="font-size:13px;">收款方信息</h6>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">维修公司名称</label>
                    <input type="text" class="form-control" name="company_name" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">收款单位</label>
                    <input type="text" class="form-control" name="payee" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">开户银行</label>
                    <input type="text" class="form-control" name="bank_name">
                </div>
                <div class="col-md-3">
                    <label class="form-label">账号</label>
                    <input type="text" class="form-control" name="bank_account">
                </div>
            </div>
        </div>
    </div>

    <!-- 发票明细 -->
    <div class="card mb-3" style="border:1px solid #e5e7eb;border-radius:10px;">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold mb-0" style="font-size:13px;">发票明细</h6>
                <button type="button" class="btn btn-sm btn-outline-warning" onclick="addInvoice()"><i class="fas fa-plus"></i> 添加发票</button>
            </div>
            <div id="invoiceList"></div>
            <div class="text-end mt-2" style="font-size:14px;">
                合计: <strong id="totalAmount" style="color:#f59e0b;">¥0.00</strong>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning"><i class="fas fa-save"></i> 保存批次</button>
        <a href="{{ url_for('finance.index') }}" class="btn btn-outline-secondary">取消</a>
    </div>
</form>

<script>
let invoiceCount = 0;
function addInvoice(no, amount) {
    invoiceCount++;
    const html = `
    <div class="invoice-row" id="inv_${invoiceCount}">
        <div class="row g-2 align-items-center">
            <div class="col-md-5">
                <label class="form-label" style="font-size:12px;">发票号码</label>
                <input type="text" class="form-control form-control-sm inv-no" value="${no||''}" placeholder="如：12345678">
            </div>
            <div class="col-md-4">
                <label class="form-label" style="font-size:12px;">发票金额(元)</label>
                <input type="number" step="0.01" class="form-control form-control-sm inv-amount" value="${amount||''}" placeholder="0.00" oninput="calcTotal()">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeInvoice('inv_${invoiceCount}')"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>`;
    document.getElementById('invoiceList').insertAdjacentHTML('beforeend', html);
    calcTotal();
}
function removeInvoice(id) {
    document.getElementById(id).remove();
    calcTotal();
}
function calcTotal() {
    let t = 0;
    document.querySelectorAll('.inv-amount').forEach(el => { t += parseFloat(el.value) || 0; });
    document.getElementById('totalAmount').textContent = '¥' + t.toFixed(2);
}
document.getElementById('batchForm').addEventListener('submit', function(e) {
    const invoices = [];
    document.querySelectorAll('.invoice-row').forEach(row => {
        const no = row.querySelector('.inv-no').value.trim();
        const amt = parseFloat(row.querySelector('.inv-amount').value) || 0;
        if (no || amt) invoices.push({invoice_no: no, amount: amt});
    });
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'invoices_json';
    input.value = JSON.stringify(invoices);
    this.appendChild(input);
});
// Start with one empty row
addInvoice();
</script>
{% endblock %}
