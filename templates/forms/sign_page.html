<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>签名 - {{ form.name }}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f1f5f9; display:flex; flex-direction:column; min-height:100vh;
    user-select:none; -webkit-user-select:none;
}
.header {
    background:#fff; padding:16px 20px; text-align:center;
    border-bottom:1px solid #e2e8f0;
}
.header h3 { font-size:16px; color:#1e293b; margin-bottom:4px; }
.header p { font-size:13px; color:#64748b; }
.canvas-wrap {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:16px;
}
.canvas-box {
    background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08);
    padding:12px; width:100%; max-width:500px;
}
.canvas-label { font-size:13px; color:#64748b; margin-bottom:8px; }
#sigCanvas {
    width:100%; height:200px; border:2px dashed #d1d5db;
    border-radius:8px; touch-action:none; cursor:crosshair;
    background:#fafbfc;
}
.actions {
    display:flex; gap:12px; padding:16px 20px; background:#fff;
    border-top:1px solid #e2e8f0;
}
.actions button {
    flex:1; padding:14px 20px; border:none; border-radius:8px;
    font-size:16px; font-weight:600; cursor:pointer; transition:all .15s;
}
.btn-clear { background:#f1f5f9; color:#64748b; }
.btn-clear:active { background:#e2e8f0; }
.btn-save { background:#4f46e5; color:#fff; }
.btn-save:active { background:#4338ca; }
.btn-save:disabled { opacity:.5; }
.status { text-align:center; font-size:13px; color:#64748b; padding:8px 20px; }
.status.success { color:#16a34a; }
</style>
</head>
<body>
<div class="header">
    <h3>✍ 签名确认</h3>
    <p>{{ form.name }}</p>
</div>

<div class="canvas-wrap">
    <div class="canvas-box">
        <div class="canvas-label">请在下方空白处签名：</div>
        <canvas id="sigCanvas"></canvas>
    </div>
</div>

<div class="status" id="status">请在签名区用手指签写姓名</div>

<div class="actions">
    <button class="btn-clear" onclick="clearSig()">🗑 清除</button>
    <button class="btn-save" id="btnSave" onclick="saveSig()">✅ 提交签名</button>
</div>

<script>
var canvas = document.getElementById('sigCanvas');
var ctx = canvas.getContext('2d');
var drawing = false;
var hasContent = false;
var token = '{{ token }}';
var submitUrl = '{{ url_for("forms.form_field_sign", fid=form.id) }}';

function resize() {
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    ctx.scale(2, 2);
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
}
window.addEventListener('resize', resize);
resize();

function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    var clientX, clientY;
    if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; e.preventDefault(); }
    else { clientX = e.clientX; clientY = e.clientY; }
    return { x: clientX - rect.left, y: clientY - rect.top };
}

canvas.addEventListener('touchstart', function(e) {
    e.preventDefault(); var p = getPos(e); drawing = true; hasContent = true;
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
    document.getElementById('status').className = 'status';
    document.getElementById('btnSave').disabled = false;
}, {passive:false});

canvas.addEventListener('touchmove', function(e) {
    e.preventDefault(); if (!drawing) return;
    var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
}, {passive:false});

canvas.addEventListener('touchend', function() { drawing = false; });
canvas.addEventListener('touchcancel', function() { drawing = false; });

canvas.addEventListener('mousedown', function(e) {
    var p = getPos(e); drawing = true; hasContent = true;
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
    document.getElementById('status').className = 'status';
    document.getElementById('btnSave').disabled = false;
});
canvas.addEventListener('mousemove', function(e) {
    if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
});
canvas.addEventListener('mouseup', function() { drawing = false; });
canvas.addEventListener('mouseleave', function() { drawing = false; });

function clearSig() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasContent = false;
    document.getElementById('status').textContent = '请在签名区用手指签写姓名';
    document.getElementById('status').className = 'status';
    document.getElementById('btnSave').disabled = true;
}

function saveSig() {
    if (!hasContent) { alert('请先签名'); return; }
    var dataUrl = canvas.toDataURL('image/png');
    var btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = '⏳ 提交中...';
    var status = document.getElementById('status');
    status.textContent = '正在提交签名...';
    
    var xhr = new XMLHttpRequest();
    xhr.open('POST', submitUrl, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
        if (xhr.status === 200) {
            status.textContent = '✅ 签名已提交！页面将自动关闭...';
            status.className = 'status success';
            btn.textContent = '✅ 已提交';
            setTimeout(function() { window.close(); }, 1500);
        } else {
            status.textContent = '❌ 提交失败，请重试';
            btn.disabled = false; btn.textContent = '✅ 提交签名';
        }
    };
    xhr.onerror = function() {
        status.textContent = '❌ 网络错误，请重试';
        btn.disabled = false; btn.textContent = '✅ 提交签名';
    };
    xhr.send(JSON.stringify({field_id: '{{ field_id }}', signature: dataUrl}));
}
</script>
</body>
</html>
