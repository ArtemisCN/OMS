{% extends "base.html" %}
{% block title %}扫码报修{% endblock %}
{% block content %}
<style>
.hospital-card { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-radius:12px; padding:24px; cursor:pointer; transition:transform 0.2s; }
.hospital-card:hover { transform:translateY(-3px); }
</style>
<div class="text-center mb-4">
    <h4><i class="fas fa-qrcode text-primary"></i> 扫码报修</h4>
    <p class="text-muted">选择医院，生成科室报修二维码</p>
</div>
<div class="row g-3">
    {% for h in hospitals %}
    <div class="col-md-4">
        <div class="hospital-card" onclick="location.href='{{ url_for('scan.scan_department', hospital_id=h.id) }}'">
            <h5>{{ h.name }}</h5>
            <small>点击生成报修二维码 →</small>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
