{% macro render_pagination(pagination, endpoint, task_id='') %}
<nav class="mt-3">
    <ul class="pagination pagination-sm justify-content-center">
        <li class="page-item {{ 'disabled' if not pagination.has_prev }}">
            <a class="page-link" href="{% if pagination.has_prev %}{{ url_for(endpoint, page=pagination.prev_num, task_id=task_id if task_id else none) }}{% else %}#{% endif %}">&laquo;</a>
        </li>
        {% for p in pagination.iter_pages(left_edge=1, right_edge=1, left_current=2, right_current=2) %}
            {% if p %}
            <li class="page-item {{ 'active' if p == pagination.page }}">
                <a class="page-link" href="{{ url_for(endpoint, page=p, task_id=task_id if task_id else none) }}">{{ p }}</a>
            </li>
            {% else %}
            <li class="page-item disabled"><span class="page-link">...</span></li>
            {% endif %}
        {% endfor %}
        <li class="page-item {{ 'disabled' if not pagination.has_next }}">
            <a class="page-link" href="{% if pagination.has_next %}{{ url_for(endpoint, page=pagination.next_num, task_id=task_id if task_id else none) }}{% else %}#{% endif %}">&raquo;</a>
        </li>
    </ul>
</nav>
{% endmacro %}
