<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工单助手</title>
    <link href="/static/vendor/fontawesome/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f6fa; color: #1e293b; font-size: 15px;
            padding-bottom: 70px;
        }
        /* 顶部栏 */
        .m-header {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: #fff; padding: 16px 16px 14px;
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 12px;
        }
        .m-header h1 { font-size: 18px; font-weight: 600; flex:1; }
        .m-header .user { font-size: 13px; opacity: .85; }
        .m-header a { color:#fff; text-decoration:none; font-size: 14px; opacity:.8; }

        /* 两个池子标签 */
        .stat-row {
            display: flex; margin: 12px 12px 0; gap: 8px;
        }
        .stat-item {
            flex:1; background:#fff; border-radius:10px; padding:10px 8px;
            text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06);
            border:1px solid #e8ecf1; transition:all .2s;
            text-decoration: none; color: inherit; display: block;
        }
        .stat-item.active {
            border-color: #4f46e5; background: #eef2ff;
        }
        .stat-item .stat-num { font-size: 22px; font-weight: 700; color: #4f46e5; display: block; }
        .stat-item .stat-label { font-size: 12px; color: #64748b; margin-top: 2px; display: block; }

        /* 工单列表 */
        .order-list { padding: 0 12px; }
        .order-card {
            background: #fff; border-radius: 12px; padding: 14px 16px;
            margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
            border: 1px solid #e8ecf1; display: block; text-decoration: none;
            color: inherit; transition: transform .15s;
        }
        .order-card:active { transform: scale(0.98); }
        .order-card .top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px;
        }
        .order-card .title { font-size: 15px; font-weight: 600; color: #1e293b; flex:1; }
        .order-card .badge-status {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 500; margin-left: 8px; flex-shrink:0;
        }
        .badge-pending { background: #fffbeb; color: #b45309; }
        .badge-in_progress { background: #eef2ff; color: #4f46e5; }
        .badge-completed { background: #ecfdf5; color: #059669; }
        .order-card .meta {
            display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; color: #64748b;
        }
        .order-card .meta span { display: inline-flex; align-items: center; gap: 4px; }
        .order-card .meta i { font-size: 12px; opacity: .6; }

        /* 空状态 */
        .empty {
            text-align: center; padding: 60px 20px; color: #94a3b8;
        }
        .empty i { font-size: 48px; opacity: .25; margin-bottom: 12px; }

        /* 详情页 */
        .detail-wrap { padding: 12px; }
        .detail-card {
            background: #fff; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
            border: 1px solid #e8ecf1;
        }
        .detail-card h3 {
            font-size: 14px; font-weight: 600; color: #4f46e5;
            margin-bottom: 10px; padding-bottom: 8px;
            border-bottom: 1px solid #f1f5f9;
        }
        .detail-card .row { display: flex; padding: 4px 0; font-size: 14px; }
        .detail-card .label { width: 80px; color: #94a3b8; flex-shrink:0; }
        .detail-card .value { flex:1; color: #1e293b; font-weight: 500; }

        /* 按钮 */
        .btn-block {
            display: block; width: 100%; padding: 14px; border: none;
            border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: opacity .2s; text-align: center;
        }
        .btn-block:active { opacity: .8; }
        .btn-primary-bg { background: #4f46e5; color: #fff; }
        .btn-success-bg { background: #059669; color: #fff; }
        .btn-secondary-bg { background: #f1f5f9; color: #475569; }

        /* 表单 */
        textarea.form-input {
            width: 100%; min-height: 120px; border: 1px solid #e8ecf1;
            border-radius: 10px; padding: 12px; font-size: 15px;
            font-family: inherit; resize: vertical; outline: none;
            transition: border-color .2s;
        }
        textarea.form-input:focus { border-color: #4f46e5; }

        /* Flash 消息 */
        .flash {
            margin: 8px 12px; padding: 10px 14px; border-radius: 8px;
            font-size: 14px;
        }
        .flash-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .flash-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .flash-warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

        @media (min-width: 600px) {
            body { max-width: 480px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="m-header">
        <i class="fas fa-tools"></i>
        <h1>工单助手</h1>
        <span class="user"><i class="fas fa-user-circle"></i> {{ current_user.display_name or current_user.username }}</span>
        <a href="{{ url_for('mobile.publish') }}" style="color:#fff;font-size:16px;margin-right:8px;opacity:.85;" title="发布工单"><i class="fas fa-plus-circle"></i></a>
        <a href="{{ url_for('mobile.exam_list') }}" style="color:#fff;font-size:15px;margin-right:8px;opacity:.85;" title="在线考试"><i class="fas fa-graduation-cap"></i></a>
        <a href="{{ url_for('auth.logout') }}"><i class="fas fa-sign-out-alt"></i></a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
